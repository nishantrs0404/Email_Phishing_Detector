<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; font-family: Arial, sans-serif; background: #f9f9f9; }
    .header { background: #1a73e8; color: white; padding: 14px 16px; }
    .header h2 { font-size: 15px; font-weight: bold; }
    .header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px;
             background: #ddd; border-bottom: 1px solid #ddd; }
    .stat { background: white; padding: 12px 8px; text-align: center; }
    .stat .num { font-size: 22px; font-weight: bold; color: #333; }
    .stat .num.danger { color: #ff4444; }
    .stat .num.safe { color: #00cc44; }
    .stat .label { font-size: 10px; color: #888; margin-top: 2px; }
    .section { padding: 12px 16px; background: white; margin-top: 1px; }
    .section h3 { font-size: 12px; color: #666; margin-bottom: 8px;
                  text-transform: uppercase; letter-spacing: 0.5px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%;
                  display: inline-block; margin-right: 6px; }
    .dot-green { background: #00cc44; }
    .dot-red { background: #ff4444; }
    .status-row { display: flex; align-items: center; font-size: 12px; color: #333; }
    .footer { padding: 10px 16px; font-size: 11px; color: #aaa;
              text-align: center; background: white; margin-top: 1px; }
  </style>
</head>
<body>
  <div class="header">
    <h2>Phishing Detector</h2>
    <p>Real-time Gmail protection</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="num" id="scanned">0</div>
      <div class="label">Emails</div>
    </div>
    <div class="stat">
      <div class="num" id="links">0</div>
      <div class="label">Links</div>
    </div>
    <div class="stat">
      <div class="num danger" id="threats">0</div>
      <div class="label">Threats</div>
    </div>
  </div>
  <div class="section">
    <h3>Status</h3>
    <div class="status-row">
      <span class="status-dot dot-green" id="extDot"></span>
      <span id="extStatus">Extension active</span>
    </div>
    <div class="status-row" style="margin-top:6px">
      <span class="status-dot dot-red" id="backendDot"></span>
      <span id="backendStatus">Checking backend...</span>
    </div>
  </div>
  <div class="footer">ML Model: Random Forest · AUC 0.9491</div>
  <script src="popup.js"></script>
</body>
</html>
